<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HYDRA SUSTAIN — Sistema de Monitoramento Integrado</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0D0A0A">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HYDRA Sustain">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg-void:#0D0A0A;
  --bg-panel:#181212;
  --bg-raised:#221A1A;
  --bg-input:#140F0F;
  --line:#33201F;
  --line-bright:#4A2C2A;
  --text:#F2E8E6;
  --text-muted:#AD9694;
  --text-dim:#6E5957;
  --cyan:#E5382A;
  --cyan-dim:rgba(229,56,42,0.16);
  --amber:#E8A63D;
  --amber-dim:rgba(232,166,61,0.14);
  --green:#5FCB82;
  --green-dim:rgba(95,203,130,0.14);
  --red:#FF5A46;
  --red-dim:rgba(255,90,70,0.16);
  --font-display:'Chakra Petch','Segoe UI',sans-serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background-color:var(--bg-void);
  background-image:
    linear-gradient(rgba(229,56,42,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(229,56,42,0.045) 1px, transparent 1px);
  background-size:28px 28px;
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--cyan);}
button{font-family:var(--font-body); cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
::selection{background:var(--cyan-dim); color:var(--text);}
:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

/* ---------- layout shell ---------- */
#root{min-height:100vh;}
.hidden{display:none !important;}

.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 22px; border-bottom:1px solid var(--line);
  background:rgba(27,33,40,0.7); backdrop-filter:blur(6px);
  position:sticky; top:0; z-index:20;
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:30px; height:30px; border:2px solid var(--cyan); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; color:#0D0A0A; background:var(--cyan); font-size:13px;
  box-shadow:0 0 14px rgba(229,56,42,0.35);
}
.brand-text{font-family:var(--font-display); font-weight:600; letter-spacing:0.5px; font-size:16px;}
.brand-sub{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:1.5px; text-transform:uppercase;}
.topbar-right{display:flex; align-items:center; gap:14px;}
.session-chip{
  display:flex; align-items:center; gap:8px; padding:6px 12px;
  border:1px solid var(--line); border-radius:20px; background:var(--bg-raised);
  font-size:12.5px;
}
.role-pill{
  font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:0.8px;
  padding:2px 8px; border-radius:10px; font-weight:600;
}
.role-admin{background:var(--red-dim); color:var(--red);}
.role-editor{background:var(--amber-dim); color:var(--amber);}
.role-viewer{background:var(--cyan-dim); color:var(--cyan);}
.btn{
  font-family:var(--font-body); font-weight:600; font-size:13px;
  padding:8px 16px; border-radius:6px; border:1px solid var(--line-bright);
  background:var(--bg-raised); color:var(--text); transition:all .15s ease;
}
.btn:hover{border-color:var(--cyan); color:var(--cyan);}
.btn-primary{background:var(--cyan); color:#0D1418; border-color:var(--cyan); font-weight:700;}
.btn-primary:hover{background:#6EE0E7; color:#0D1418; opacity:.95;}
.btn-ghost{background:transparent; border-color:transparent; color:var(--text-muted);}
.btn-ghost:hover{color:var(--cyan); border-color:transparent;}
.btn-danger{border-color:var(--red);color:var(--red); background:transparent;}
.btn-danger:hover{background:var(--red-dim);}
.btn-sm{padding:5px 10px; font-size:12px; border-radius:5px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}

.app-body{display:flex; min-height:calc(100vh - 60px);}

.sidebar{
  width:210px; flex-shrink:0; border-right:1px solid var(--line);
  padding:18px 10px; display:flex; flex-direction:column; gap:2px;
}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:6px;
  color:var(--text-muted); font-size:13.5px; font-weight:500; text-decoration:none;
  border:1px solid transparent; background:none; width:100%; text-align:left;
}
.nav-item:hover{color:var(--text); background:var(--bg-panel);}
.nav-item.active{color:var(--cyan); background:var(--cyan-dim); border-color:rgba(79,209,217,0.3);}
.nav-icon{width:16px; text-align:center; font-family:var(--font-mono); font-size:13px;}
.nav-section-label{font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.2px; padding:14px 12px 6px;}

.main{flex:1; padding:22px 26px 60px; max-width:1180px;}

h1,h2,h3{font-family:var(--font-display); font-weight:600; letter-spacing:0.2px;}
.page-title{font-size:22px; margin-bottom:4px;}
.page-sub{color:var(--text-muted); font-size:13px; margin-bottom:22px;}
.eyebrow{font-family:var(--font-mono); font-size:10.5px; color:var(--cyan); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px;}

/* ---------- panel / bracket signature ---------- */
.panel{
  position:relative; background:var(--bg-panel); border:1px solid var(--line);
  border-radius:6px; padding:18px; margin-bottom:18px;
}
.panel::before,.panel::after{
  content:''; position:absolute; width:12px; height:12px; pointer-events:none; opacity:.55;
}
.panel::before{top:-1px; left:-1px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); border-top-left-radius:3px;}
.panel::after{bottom:-1px; right:-1px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); border-bottom-right-radius:3px;}
.panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}

.panel-spotlight{
  position:relative; background:linear-gradient(135deg, rgba(232,166,61,0.10), rgba(27,18,18,0.4) 60%);
  border:1px solid rgba(232,166,61,0.45); border-radius:8px; padding:18px; margin-bottom:20px;
  box-shadow:0 0 0 1px rgba(232,166,61,0.08), 0 8px 28px rgba(232,166,61,0.10);
}
.panel-spotlight::before,.panel-spotlight::after{content:''; position:absolute; width:16px; height:16px; pointer-events:none;}
.panel-spotlight::before{top:-1px; left:-1px; border-top:2px solid var(--amber); border-left:2px solid var(--amber); border-top-left-radius:4px;}
.panel-spotlight::after{bottom:-1px; right:-1px; border-bottom:2px solid var(--amber); border-right:2px solid var(--amber); border-bottom-right-radius:4px;}
.spotlight-head{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.spotlight-icon{
  width:34px; height:34px; border-radius:50%; background:var(--amber-dim); border:1px solid rgba(232,166,61,0.5);
  display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.spotlight-title{font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--amber); letter-spacing:0.2px;}
.spotlight-sub{font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-top:1px;}
.spotlight-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:20px;}
.spotlight-col-title{font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:1px; color:var(--amber); margin-bottom:8px; opacity:0.85;}
.birthday-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(232,166,61,0.14);}
.birthday-row:last-child{border-bottom:none;}
.birthday-date{
  font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--amber); background:var(--amber-dim);
  border-radius:5px; padding:3px 7px; flex-shrink:0; min-width:38px; text-align:center;
}
.panel-title{font-family:var(--font-display); font-size:14.5px; font-weight:600;}
.panel-title small{display:block; font-family:var(--font-mono); font-size:10px; color:var(--text-dim); font-weight:400; letter-spacing:0.5px; margin-top:2px;}

/* ---------- KPI strip ---------- */
.kpi-strip{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px;}
.kpi{background:var(--bg-panel); border:1px solid var(--line); border-radius:6px; padding:14px 16px; position:relative; overflow:hidden;}
.kpi::before{content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--kpi-color,var(--cyan));}
.kpi-label{font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:6px;}
.kpi-value{font-family:var(--font-display); font-size:26px; font-weight:700; color:var(--kpi-color,var(--cyan));}
.kpi-hint{font-size:11px; color:var(--text-muted); margin-top:2px;}

/* ---------- table ---------- */
table{width:100%; border-collapse:collapse; font-size:13px;}
th{
  text-align:left; font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase;
  letter-spacing:0.6px; color:var(--text-dim); font-weight:600; padding:8px 10px;
  border-bottom:1px solid var(--line-bright);
}
td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(79,209,217,0.03);}
.table-wrap{overflow-x:auto;}

.badge{
  display:inline-flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:10.5px;
  padding:3px 9px; border-radius:12px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase;
  white-space:nowrap;
}
.badge-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}
.badge-green{background:var(--green-dim); color:var(--green);}
.badge-amber{background:var(--amber-dim); color:var(--amber);}
.badge-red{background:var(--red-dim); color:var(--red);}
.badge-cyan{background:var(--cyan-dim); color:var(--cyan);}
.badge-gray{background:var(--bg-raised); color:var(--text-muted);}

.subteam-tag{font-size:11px; padding:2px 8px; border-radius:4px; background:var(--bg-raised); color:var(--text-muted); border:1px solid var(--line);}

/* ---------- forms ---------- */
.field{margin-bottom:13px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%; background:var(--bg-input); border:1px solid var(--line-bright); color:var(--text);
  padding:9px 11px; border-radius:5px; font-size:13.5px;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);}
.field textarea{resize:vertical; min-height:70px;}
.pw-field-wrap{position:relative;}
.pw-field-wrap input{padding-right:40px;}
.pw-toggle-btn{
  position:absolute; right:4px; top:50%; transform:translateY(-50%); background:none; border:none;
  color:var(--text-dim); font-size:15px; cursor:pointer; padding:6px 8px; line-height:1;
}
.pw-toggle-btn:hover{color:var(--cyan);}
.link-btn{background:none; border:none; color:var(--cyan); font-size:12.5px; font-weight:600; padding:0; text-decoration:underline; cursor:pointer;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.form-row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
.form-actions{display:flex; gap:10px; margin-top:6px;}

/* ---------- member card grid ---------- */
.member-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px;}
.member-card{
  position:relative; background:var(--bg-panel); border:1px solid var(--line); border-radius:6px;
  padding:16px; cursor:pointer; transition:border-color .15s ease;
}
.member-card:hover{border-color:var(--cyan);}
.member-card::before,.member-card::after{content:''; position:absolute; width:10px; height:10px; opacity:0; transition:opacity .15s ease;}
.member-card::before{top:-1px; left:-1px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan);}
.member-card::after{bottom:-1px; right:-1px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan);}
.member-card:hover::before,.member-card:hover::after{opacity:1;}
.member-avatar{
  width:38px; height:38px; border-radius:6px; background:var(--bg-raised); border:1px solid var(--line-bright);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700;
  color:var(--cyan); font-size:15px; margin-bottom:10px;
}
.member-name{font-family:var(--font-display); font-weight:600; font-size:14.5px; margin-bottom:2px;}
.member-role{font-size:11.5px; color:var(--text-muted); margin-bottom:10px;}
.member-meta-row{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); font-family:var(--font-mono); margin-top:8px; padding-top:8px; border-top:1px solid var(--line);}

/* ---------- modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(7,9,11,0.72); backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal{
  background:var(--bg-panel); border:1px solid var(--line-bright); border-radius:8px;
  max-width:640px; width:100%; max-height:88vh; overflow-y:auto; padding:24px;
  position:relative;
}
.modal-close{position:absolute; top:16px; right:18px; background:none; border:none; color:var(--text-muted); font-size:20px;}
.modal-close:hover{color:var(--red);}
.modal-title{font-family:var(--font-display); font-size:18px; margin-bottom:16px; padding-right:24px;}
.tab-strip{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:16px;}
.tab-btn{padding:8px 14px; font-size:12.5px; font-weight:600; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--cyan); border-bottom-color:var(--cyan);}

/* ---------- progress bar ---------- */
.progress-track{height:6px; background:var(--bg-raised); border-radius:4px; overflow:hidden; border:1px solid var(--line);}
.progress-fill{height:100%; background:var(--cyan); border-radius:4px;}

/* ---------- login ---------- */
.login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
.login-box{width:100%; max-width:400px;}
.login-brand{display:flex; flex-direction:column; align-items:center; margin-bottom:26px; text-align:center;}
.login-brand .brand-mark{width:52px; height:52px; font-size:22px; margin-bottom:12px;}
.login-brand .brand-text{font-size:22px;}
.auth-switch{display:flex; margin-bottom:20px; border:1px solid var(--line); border-radius:6px; overflow:hidden;}
.auth-switch button{flex:1; padding:10px; background:var(--bg-panel); border:none; color:var(--text-muted); font-weight:600; font-size:13px;}
.auth-switch button.active{background:var(--cyan-dim); color:var(--cyan);}
.hint-box{
  font-size:11.5px; color:var(--text-dim); background:var(--bg-input); border:1px dashed var(--line-bright);
  border-radius:5px; padding:10px 12px; margin-top:14px; font-family:var(--font-mono); line-height:1.6;
}
.msg{padding:10px 12px; border-radius:5px; font-size:12.5px; margin-bottom:14px;}
.msg-error{background:var(--red-dim); color:var(--red); border:1px solid rgba(232,96,79,0.3);}
.msg-ok{background:var(--green-dim); color:var(--green); border:1px solid rgba(95,203,130,0.3);}
.msg-info{background:var(--cyan-dim); color:var(--cyan); border:1px solid rgba(79,209,217,0.3);}

.empty-state{text-align:center; padding:40px 20px; color:var(--text-dim);}
.empty-state .em-icon{font-size:26px; margin-bottom:10px; color:var(--text-dim); font-family:var(--font-mono);}

.two-col{display:grid; grid-template-columns:1.4fr 1fr; gap:18px;}
.hamburger-btn{display:none; background:none; border:1px solid var(--line-bright); color:var(--text); font-size:16px; padding:7px 11px; border-radius:6px;}
.sidebar-backdrop{display:none;}

@media (max-width:880px){
  .two-col{grid-template-columns:1fr;}
  .form-row,.form-row3{grid-template-columns:1fr;}
  .app-body{flex-direction:column;}
  .hamburger-btn{display:inline-flex; align-items:center; justify-content:center;}
  .brand-text{font-size:14px;}
  .brand-sub{display:none;}
  .session-chip span:first-child{display:none;}
  .topbar{padding:10px 12px; gap:8px;}
  .topbar-right{gap:8px;}
  .main{padding:14px 14px 70px;}

  .sidebar{
    position:fixed; top:0; left:0; bottom:0; width:250px; z-index:60;
    background:var(--bg-panel); border-right:1px solid var(--line-bright);
    flex-direction:column; overflow-y:auto; overflow-x:hidden;
    transform:translateX(-104%); transition:transform .22s ease;
    padding-top:60px; box-shadow:8px 0 30px rgba(0,0,0,0.4);
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-backdrop.open{
    display:block; position:fixed; inset:0; background:rgba(7,9,11,0.6); z-index:55;
  }
  .nav-item{padding:13px 14px; font-size:14.5px;}

  .modal-overlay{padding:0; align-items:flex-end;}
  .modal{max-width:100%; width:100%; max-height:92vh; border-radius:14px 14px 0 0; padding:18px;}
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .member-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .btn{padding:9px 15px;}
  .btn-sm{padding:7px 12px;}
  table{font-size:12px;}
}
@media (max-width:420px){
  .kpi-strip{grid-template-columns:1fr 1fr;}
  .member-grid{grid-template-columns:1fr 1fr;}
}

.icon-btn{background:none; border:none; color:var(--text-dim); font-size:14px; padding:4px 6px;}
.icon-btn:hover{color:var(--cyan);}
.log-item{display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:12px;}
.log-item:last-child{border-bottom:none;}
.log-time{font-family:var(--font-mono); color:var(--text-dim); flex-shrink:0; width:110px;}
.toast{position:fixed; bottom:20px; right:20px; background:var(--bg-raised); border:1px solid var(--cyan); color:var(--text); padding:12px 18px; border-radius:6px; font-size:13px; z-index:200; box-shadow:0 6px 24px rgba(0,0,0,0.4);}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* =====================================================================
   HYDRA SUSTAIN — Sistema de Monitoramento Integrado
   Armazenamento: Supabase (tabela hydra_storage, dados compartilhados
   entre usuários do time). Fallback local em localStorage se offline.
===================================================================== */

const PRISTINE_HTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

const SUPABASE_URL = 'https://sqzjghxwfnjvkrurupfu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxempnaHh3Zm5qdmtydXJ1cGZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTk2ODYsImV4cCI6MjA5OTczNTY4Nn0.tIF6emSjPiGnZuqd6tFzL1cXkk0foA6G6PYcXoRhyJE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SUPABASE_TABLE = 'hydra_storage';

const STORE_KEYS = {
  users:'rivet:users', members:'rivet:members', schedules:'rivet:schedules',
  absences:'rivet:absences', pdp:'rivet:pdp', settings:'rivet:settings', log:'rivet:log',
  events:'rivet:events', theme:'hydra:theme'
};

const SUBTEAMS = ['Mecânica','Elétrica','Programação','Estratégia','Design/CAD','Divulgação/Outreach','Gestão'];
const ABSENCE_TYPES = ['Falta','Atraso','Saída antecipada','Licença/Afastamento'];
const WEEKDAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];

let DB = { users:[], members:[], schedules:[], absences:[], pdp:[], settings:{ teamName:'Equipe de Robótica', adminEmail:'' }, log:[], events:[] };
let THEME = null; // {accent, bg, text} — personalização de cores, local ao navegador/conta
let SESSION = null; // logged in user object
let VIEW = 'dashboard';
let SIDEBAR_OPEN = false;
let AUTH_MODE = 'login'; // or 'register'
let AUTH_MSG = null;

function uid(){ return Math.random().toString(36).slice(2,10); }
function genTempPassword(){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let out = '';
  for(let i=0;i<8;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
function nowISO(){ return new Date().toISOString(); }
function fmtDate(iso){ if(!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('pt-BR'); }
function fmtDateTime(iso){ if(!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function pwField(labelText, name, id, extraAttrs){
  return `<div class="field"><label>${esc(labelText)}</label><div class="pw-field-wrap">
    <input type="password" name="${name}" id="${id}" ${extraAttrs||''}>
    <button type="button" class="pw-toggle-btn" data-target="${id}" title="Mostrar/ocultar senha">👁</button>
  </div></div>`;
}
function attachPasswordToggles(){
  document.querySelectorAll('.pw-toggle-btn').forEach(btn=>{

      input.type = input.type==='password' ? 'text' : 'password';
      btn.textContent = input.type==='password' ? '👁' : '🙈';
    };
  });
}

async function storageGet(key, shared){
  try{
    const { data, error } = await sb.from(SUPABASE_TABLE).select('value').eq('key', key).maybeSingle();
    if(error) throw error;
    if(data) return data.value;
    // nada no Supabase ainda: tenta migrar de um valor local antigo, se existir
    const raw = localStorage.getItem('hydra_'+key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){
    console.error('supabase get failed', key, e);
    try{ const raw = localStorage.getItem('hydra_'+key); return raw ? JSON.parse(raw) : null; }
    catch(e2){ return null; }
  }
}
async function storageSet(key, value, shared){
  try{ localStorage.setItem('hydra_'+key, JSON.stringify(value)); }catch(e){}
  try{
    const { error } = await sb.from(SUPABASE_TABLE).upsert({ key, value }, { onConflict:'key' });
    if(error) throw error;
    return true;
  }catch(e){
    console.error('supabase set failed', key, e);
    return false;
  }
}

function hexToRgba(hex, alpha){
  const h = (hex||'').replace('#','');
  if(h.length!==6) return `rgba(229,56,42,${alpha})`;
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function applyTheme(theme){
  const root = document.documentElement.style;
  const t = theme || {};
  root.setProperty('--cyan', t.accent || '#E5382A');
  root.setProperty('--cyan-dim', hexToRgba(t.accent || '#E5382A', 0.16));
  root.setProperty('--bg-void', t.bg || '#0D0A0A');
  root.setProperty('--text', t.text || '#F2E8E6');
}

/* ---------------------- SINCRONIZAÇÃO ONLINE ENTRE INSTALAÇÕES ----------------------
   Um único arquivo HTML instalado em vários computadores não compartilha dados entre
   si sozinho. Para permitir que quem instalar o programa em máquinas diferentes veja
   as mesmas informações "online", conectamos a um serviço de nuvem neutro (JSONBin.io)
   configurado pelo próprio administrador — ver painel "Sincronização entre computadores"
   em Configurações. Sem essa configuração, cada instalação permanece independente
   (como já funcionava antes). ----------------------------------------------------- */
function syncConfigured(){
  return !!(DB.settings.syncEnabled && DB.settings.syncBinId && DB.settings.syncApiKey);
}
function syncUrl(){ return `https://api.jsonbin.io/v3/b/${DB.settings.syncBinId}`; }

let AUTO_SYNC_TIMER = null;
function triggerAutoSync(){
  if(!syncConfigured()) return;
  clearTimeout(AUTO_SYNC_TIMER);
  AUTO_SYNC_TIMER = setTimeout(()=>{ syncPush().catch(()=>{}); }, 1200);
}

async function syncPush(){
  if(!syncConfigured()) return {ok:false, reason:'não configurado'};
  const snapshot = { users:DB.users, members:DB.members, schedules:DB.schedules, absences:DB.absences, pdp:DB.pdp, events:DB.events, settings:DB.settings, log:DB.log, savedAt: nowISO() };
  try{
    const res = await fetch(syncUrl(), {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': DB.settings.syncApiKey },
      body: JSON.stringify(snapshot)
    });
    if(!res.ok) return {ok:false, reason:`HTTP ${res.status}`};
    DB.settings.lastSync = snapshot.savedAt;
    await storageSet(STORE_KEYS.settings, DB.settings, true);
    return {ok:true};
  }catch(e){ return {ok:false, reason:'sem conexão ou serviço indisponível'}; }
}

async function syncPull(){
  if(!syncConfigured()) return {ok:false, reason:'não configurado'};
  try{
    const res = await fetch(syncUrl()+'/latest', { headers:{ 'X-Master-Key': DB.settings.syncApiKey } });
    if(!res.ok) return {ok:false, reason:`HTTP ${res.status}`};
    const json = await res.json();
    const remote = json && json.record;
    if(!remote) return {ok:false, reason:'nenhum dado na nuvem ainda'};
    DB.users = remote.users || DB.users;
    DB.members = remote.members || DB.members;
    DB.schedules = remote.schedules || DB.schedules;
    DB.absences = remote.absences || DB.absences;
    DB.pdp = remote.pdp || DB.pdp;
    DB.events = remote.events || DB.events;
    DB.log = remote.log || DB.log;
    const syncCfg = { syncEnabled:DB.settings.syncEnabled, syncBinId:DB.settings.syncBinId, syncApiKey:DB.settings.syncApiKey };
    DB.settings = Object.assign({}, remote.settings || DB.settings, syncCfg);
    DB.settings.lastSync = remote.savedAt || nowISO();
    await Promise.all([
      storageSet(STORE_KEYS.users, DB.users, true), storageSet(STORE_KEYS.members, DB.members, true),
      storageSet(STORE_KEYS.schedules, DB.schedules, true), storageSet(STORE_KEYS.absences, DB.absences, true),
      storageSet(STORE_KEYS.pdp, DB.pdp, true), storageSet(STORE_KEYS.events, DB.events, true),
      storageSet(STORE_KEYS.log, DB.log, true), storageSet(STORE_KEYS.settings, DB.settings, true),
    ]);
    return {ok:true};
  }catch(e){ return {ok:false, reason:'sem conexão ou serviço indisponível'}; }
}

function can(action){
  if(!SESSION) return false;
  if(SESSION.role === 'admin') return true;
  if(SESSION.role === 'editor') return action !== 'gerenciar_usuarios' && action !== 'configuracoes';
  return false; // viewer
}

function toast(msg){
  const el = document.createElement('div');
  el.className='toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

  attachPasswordToggles();

  if(installBtn) installBtn.onclick = ()=> installApp();
  const dlAppBtn = document.getElementById('downloadAppBtn');
  if(dlAppBtn) dlAppBtn.onclick = ()=> downloadAppCopy();
  const copyRegBtn = document.getElementById('copyRegisterLinkBtn');
  if(copyRegBtn) copyRegBtn.onclick = ()=> copyRegisterLink();
  const notifyBtn = document.getElementById('notifyAdminBtn');
  if(notifyBtn) notifyBtn.onclick = ()=> notifyAdminOfRegistration(AUTH_MSG && AUTH_MSG.pendingUser);
  document.querySelectorAll('.auth-switch button').forEach(b=>{
    b.onclick = ()=>{ AUTH_MODE = b.dataset.mode; AUTH_MSG=null; render(); };
  });
  const showRecoverBtn = document.getElementById('showRecoverBtn');
  if(showRecoverBtn) showRecoverBtn.onclick = ()=>{ AUTH_MODE='recover'; AUTH_MSG=null; render(); };
  const showAdminRecoverBtn = document.getElementById('showAdminRecoverBtn');
  if(showAdminRecoverBtn) showAdminRecoverBtn.onclick = ()=>{ AUTH_MODE='admin-recover'; AUTH_MSG=null; render(); };
  const backToLoginBtn2 = document.getElementById('backToLoginBtn2');
  if(backToLoginBtn2) backToLoginBtn2.onclick = ()=>{ AUTH_MODE='login'; AUTH_MSG=null; render(); };
  const adminRecoverForm = document.getElementById('adminRecoverForm');
  if(adminRecoverForm) adminRecoverForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(adminRecoverForm);
    const email = fd.get('email').trim().toLowerCase();
    const admin = DB.users.find(u=>u.email.toLowerCase()===email && u.role==='admin' && u.status==='aprovado');
    if(!admin){
      AUTH_MSG = {type:'error', text:'Nenhuma conta de administrador ativa foi encontrada com esse e-mail.'};
      render(); return;
    }
    const temp = genTempPassword();
    admin.senha = temp; admin.resetRequested = false; admin.resetRequestedAt = null;
    await saveUsers();
    await addLog(admin.nome, 'Senha de administrador redefinida via recuperação de emergência.');
    AUTH_MODE='login';
    AUTH_MSG = {type:'ok', text:`Nova senha gerada para ${admin.email}: ${temp} — anote agora, ela não será mostrada de novo. Troque-a em Configurações assim que entrar.`};
    render();
  };
  const backToLoginBtn = document.getElementById('backToLoginBtn');
  if(backToLoginBtn) backToLoginBtn.onclick = ()=>{ AUTH_MODE='login'; AUTH_MSG=null; render(); };
  const recoverForm = document.getElementById('recoverForm');
  if(recoverForm) recoverForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(recoverForm);
    const email = fd.get('email').trim().toLowerCase();
    const user = DB.users.find(u=>u.email.toLowerCase()===email);
    if(user && user.status==='aprovado'){
      user.resetRequested = true; user.resetRequestedAt = nowISO();
      await saveUsers();
      await addLog(user.nome, 'Solicitou redefinição de senha (recuperação por e-mail).');
    }
    AUTH_MODE='login';
    AUTH_MSG={type:'ok', text:'Se este e-mail estiver cadastrado e ativo, sua solicitação foi registrada. Um administrador vai gerar uma nova senha e enviá-la para o seu e-mail.'};
    render();
  };
  const lf = document.getElementById('loginForm');
  if(lf) lf.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(lf);
    const email = fd.get('email').trim().toLowerCase();
    const senha = fd.get('senha');
    const user = DB.users.find(u=>u.email.toLowerCase()===email);
    if(!user || user.senha !== senha){ AUTH_MSG = {type:'error', text:'E-mail ou senha inválidos.'}; render(); return; }
    if(user.status === 'pendente'){ AUTH_MSG = {type:'info', text:'Seu cadastro ainda aguarda aprovação do administrador.'}; render(); return; }
    if(user.status === 'rejeitado'){ AUTH_MSG = {type:'error', text:'Seu cadastro foi recusado pelo administrador.'}; render(); return; }
    if(user.status === 'inativo'){ AUTH_MSG = {type:'error', text:'Seu acesso foi desativado. Contate o administrador.'}; render(); return; }
    SESSION = user; AUTH_MSG=null; VIEW='dashboard';
    await addLog(user.nome, 'Login realizado.');
    render();
  };
  const rf = document.getElementById('registerForm');
  if(rf) rf.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(rf);
    const email = fd.get('email').trim().toLowerCase();
    if(DB.users.some(u=>u.email.toLowerCase()===email)){ AUTH_MSG={type:'error', text:'Já existe um cadastro com este e-mail.'}; render(); return; }
    const dadosMembro = {
      subequipe: fd.get('subequipe'), contato: fd.get('contato'), dataNascimento: fd.get('dataNascimento'),
      serie: fd.get('serie'), turma: fd.get('turma'), turno: fd.get('turno'),
      tamanhoCamisa: fd.get('tamanhoCamisa'), anoEntrada: Number(fd.get('anoEntrada'))||new Date().getFullYear()
    };
    const newUser = { id:uid(), nome:fd.get('nome').trim(), email, senha:fd.get('senha'), role:fd.get('role'), status:'pendente', criadoEm: nowISO(), memberId:null, dadosMembro };
    DB.users.push(newUser);
    await saveUsers();
    await addLog(newUser.nome, 'Solicitou cadastro online (aguardando aprovação).');
    AUTH_MODE='login'; AUTH_MSG={type:'ok', text:'Cadastro enviado! Aguarde a aprovação do administrador para entrar.', notify:true, pendingUser:{nome:newUser.nome, email:newUser.email, subequipe:dadosMembro.subequipe}};
    if(window.location.hash) history.replaceState(null,'',window.location.pathname+window.location.search);
    render();
  };
}

  const subject = encodeURIComponent(`Novo cadastro pendente no HYDRA Sustain — ${pendingUser.nome}`);
  const body = encodeURIComponent(

function computeMonitoring(){
  const activeMembers = DB.members.filter(m=>m.status!=='inativo');
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
  const recentAbsences = DB.absences.filter(a=> new Date(a.data) >= cutoff);
  const pendingAbsences = DB.absences.filter(a=>a.status==='Pendente');
  const byMember = {};
  recentAbsences.forEach(a=>{ byMember[a.memberId]=(byMember[a.memberId]||0)+1; });
  const threshold = DB.settings.alertThreshold || 3;
  const alertMembers = Object.entries(byMember).filter(([id,c])=>c>=threshold).map(([id,c])=>({member: DB.members.find(m=>m.id===id), count:c})).filter(x=>x.member);

  const today = new Date();
  const pdpSource = SESSION.role==='admin' ? DB.pdp : DB.pdp.filter(p=>p.memberId===SESSION.memberId);
  const overduePdp = pdpSource.filter(p=> p.status!=='Concluído' && p.prazo && new Date(p.prazo) < today);
  const totalPdp = pdpSource.length;
  const concluidoPdp = pdpSource.filter(p=>p.status==='Concluído').length;
  const justificadas = DB.absences.filter(a=>a.status==='Aprovada').length;
  const totalAbs = DB.absences.length || 1;
  const taxaJustificacao = Math.round((justificadas/totalAbs)*100);

  return { activeMembers, recentAbsences, pendingAbsences, alertMembers, overduePdp, totalPdp, concluidoPdp, taxaJustificacao };
}

function renderMonthSpotlight(){
  const now = new Date();
  const curMonth = now.getMonth();
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  const birthdays = DB.members
    .filter(m=> m.dataNascimento)
    .map(m=>{ const d = new Date(m.dataNascimento+'T00:00:00'); return {mem:m, day:d.getDate(), month:d.getMonth()}; })
    .filter(x=> x.month===curMonth)
    .sort((a,b)=> a.day-b.day);

  const today = now.toISOString().slice(0,10);
  const monthStart = `${now.getFullYear()}-${String(curMonth+1).padStart(2,'0')}-01`;
  const monthEndDate = new Date(now.getFullYear(), curMonth+1, 0);
  const monthEnd = monthEndDate.toISOString().slice(0,10);
  const monthEvents = [...DB.events].filter(e=> e.data >= monthStart && e.data <= monthEnd).sort((a,b)=> a.data.localeCompare(b.data));

  if(birthdays.length===0 && monthEvents.length===0) return '';

  const birthdaysHTML = birthdays.length===0
    ? `<div style="font-size:12px; color:var(--text-dim);">Nenhum aniversariante em ${monthNames[curMonth]}.</div>`
    : birthdays.map(x=> `<div class="birthday-row"><span class="birthday-date">${String(x.day).padStart(2,'0')}</span><span>🎂 ${esc(x.mem.nome)}</span><span class="subteam-tag" style="margin-left:auto;">${esc(x.mem.subequipe)}</span></div>`).join('');

  const eventsHTML = monthEvents.length===0
    ? `<div style="font-size:12px; color:var(--text-dim);">Nenhuma atividade agendada para ${monthNames[curMonth]}.</div>`
    : monthEvents.map(e=> `<div class="birthday-row"><span class="birthday-date">${e.data.slice(8,10)}</span><span>${esc(e.titulo)}${e.data<today?' <span style="color:var(--text-dim); font-size:10.5px;">(realizada)</span>':''}</span></div>`).join('');

  return `
  <div class="panel-spotlight">
    <div class="spotlight-head">
      <div class="spotlight-icon">🎉</div>
      <div>
        <div class="spotlight-title">Destaques de ${monthNames[curMonth]}</div>
        <div class="spotlight-sub">Aniversariantes e ações do mês · visível para toda a equipe</div>
      </div>
    </div>
    <div class="spotlight-grid">
      <div><div class="spotlight-col-title">Aniversariantes</div>${birthdaysHTML}</div>
      <div><div class="spotlight-col-title">Ações & atividades do mês</div>${eventsHTML}</div>
    </div>
  </div>`;
}

function renderAlerts(m){
  const alerts = [];
  m.alertMembers.forEach(a=> alerts.push({level:'red', text:`${a.member.nome} acumulou ${a.count} ausências nos últimos 30 dias.`}));
  m.overduePdp.forEach(p=>{ const mem = DB.members.find(x=>x.id===p.memberId); alerts.push({level:'amber', text:`Meta de PDP "${p.area}" de ${mem?mem.nome:'membro removido'} está com prazo vencido.`}); });
  if(m.pendingAbsences.length>0) alerts.push({level:'cyan', text:`${m.pendingAbsences.length} justificativa(s) de ausência aguardando avaliação.`});
  if(alerts.length===0) return emptyRow('Nenhum alerta no momento — tudo em dia.');
  return alerts.map(a=>`<div class="log-item"><span class="badge badge-${a.level}" style="flex-shrink:0;"><span class="badge-dot"></span>alerta</span><div>${esc(a.text)}</div></div>`).join('');

        </div>
        <div class="form-row3">
          <div class="field"><label>Turno que estuda</label><select name="turno">
            <option value="Manhã" ${m.turno==='Manhã'?'selected':''}>Manhã</option>
            <option value="Tarde" ${m.turno==='Tarde'?'selected':''}>Tarde</option>
            <option value="Noite" ${m.turno==='Noite'?'selected':''}>Noite</option>
            <option value="Integral" ${m.turno==='Integral'?'selected':''}>Integral</option>
          </select></div>
          <div class="field"><label>Tamanho de camisa</label><select name="tamanhoCamisa">
            ${['PP','P','M','G','GG','XG'].map(t=>`<option ${m.tamanhoCamisa===t?'selected':''}>${t}</option>`).join('')}
          </select></div>
          <div class="field"><label>Ano de entrada na equipe</label><input type="number" name="anoEntrada" min="2000" max="2100" value="${m.anoEntrada||new Date().getFullYear()}"></div>

        ${!m.id ? `<div class="field"><label><input type="checkbox" name="enviarLink" checked> Enviar por e-mail o link de acesso ao programa após salvar</label></div>` : ''}

      </form>`);
  }
  if(MODAL.type==='schedForm'){
    const needsMemberSelect = !p.memberId;
    return wrapFormModal('Novo horário', `
      <form id="schedFormEl">
        ${needsMemberSelect ? `<div class="field"><label>Membro</label><select name="memberId" required>${DB.members.map(m=>`<option value="${m.id}">${esc(m.nome)}</option>`).join('')}</select></div>` : ''}
        <div class="form-row">
          <div class="field"><label>Dia da semana</label><select name="dia">${WEEKDAYS.map(d=>`<option>${d}</option>`).join('')}</select></div>
          <div class="field"><label>Local</label><input name="local" placeholder="Oficina / Laboratório / Remoto" required></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Início</label><input type="time" name="inicio" required value="14:00"></div>
          <div class="field"><label>Fim</label><input type="time" name="fim" required value="18:00"></div>
        </div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Salvar</button><button class="btn btn-ghost" type="button" id="cancelFormBtn">Cancelar</button></div>
      </form>`);
  }
  if(MODAL.type==='absForm'){
    const needsMemberSelect = !p.memberId;
    return wrapFormModal('Registrar ausência / justificativa', `
      <form id="absFormEl">
        ${needsMemberSelect ? `<div class="field"><label>Membro</label><select name="memberId" required>${DB.members.map(m=>`<option value="${m.id}">${esc(m.nome)}</option>`).join('')}</select></div>` : ''}
        <div class="form-row">
          <div class="field"><label>Data</label><input type="date" name="data" required value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="field"><label>Tipo</label><select name="tipo">${(DB.settings.absenceTypes||ABSENCE_TYPES).map(t=>`<option>${t}</option>`).join('')}</select></div>
        </div>
        <div class="field"><label>Justificativa</label><textarea name="justificativa" placeholder="Descreva o motivo da ausência..."></textarea></div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Registrar</button><button class="btn btn-ghost" type="button" id="cancelFormBtn">Cancelar</button></div>
      </form>`);
  }
  if(MODAL.type==='pdpForm'){
    const pd = p.pdp || {};
    return wrapFormModal(pd.id?'Editar meta de desenvolvimento':'Nova meta de desenvolvimento', `
      <form id="pdpFormEl">
        <div class="field"><label>Área / Habilidade</label><input name="area" required value="${esc(pd.area||'')}" placeholder="Ex: Programação em Java, Soldagem, Liderança..."></div>
        <div class="form-row3">
          <div class="field"><label>Nível atual (1–5)</label><input type="number" min="1" max="5" name="nivelAtual" value="${pd.nivelAtual||1}"></div>
          <div class="field"><label>Nível meta (1–5)</label><input type="number" min="1" max="5" name="nivelMeta" value="${pd.nivelMeta||3}"></div>
          <div class="field"><label>Progresso (%)</label><input type="number" min="0" max="100" name="progresso" value="${pd.progresso||0}"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Prazo</label><input type="date" name="prazo" value="${pd.prazo?pd.prazo.slice(0,10):''}"></div>
          <div class="field"><label>Status</label><select name="status"><option ${pd.status==='Em andamento'?'selected':''}>Em andamento</option><option ${pd.status==='Concluído'?'selected':''}>Concluído</option><option ${pd.status==='Atrasado'?'selected':''}>Atrasado</option></select></div>
        </div>
        <div class="field"><label>Plano de ação / observações</label><textarea name="acoes">${esc(pd.acoes||'')}</textarea></div>
        <div class="field"><label>Arquivo anexo (opcional — PDF, imagem, doc; até 2MB)</label>
          <input type="file" name="arquivo">
          ${pd.anexo ? `<div style="font-size:11.5px; color:var(--text-muted); margin-top:6px;">Anexo atual: <a href="${pd.anexo.dados}" download="${esc(pd.anexo.nome)}">${esc(pd.anexo.nome)}</a>
            <label style="margin-left:10px;"><input type="checkbox" name="removerAnexo" value="1"> remover anexo</label></div>` : ''}
        </div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Salvar</button><button class="btn btn-ghost" type="button" id="cancelFormBtn">Cancelar</button></div>
      </form>`);
  }
  if(MODAL.type==='eventForm'){
    const ev = p.event || {};
    return wrapFormModal(ev.id?'Editar atividade':'Nova atividade', `
      <form id="eventFormEl">
        <div class="field"><label>Título da atividade</label><input name="titulo" required value="${esc(ev.titulo||'')}" placeholder="Ex: Reunião geral, Competição regional, Entrega do robô"></div>
        <div class="form-row">
          <div class="field"><label>Data</label><input type="date" name="data" required value="${ev.data?ev.data.slice(0,10):''}"></div>
          <div class="field"><label>Horário (opcional)</label><input type="time" name="horario" value="${esc(ev.horario||'')}"></div>
        </div>
        <div class="field"><label>Local</label><input name="local" value="${esc(ev.local||'')}" placeholder="Oficina / Escola / Ginásio da competição"></div>
        <div class="field"><label>Descrição</label><textarea name="descricao">${esc(ev.descricao||'')}</textarea></div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Salvar</button><button class="btn btn-ghost" type="button" id="cancelFormBtn">Cancelar</button></div>
      </form>`);
  }
  return '';
}
function wrapFormModal(title, body){
  return `<div class="modal-overlay" id="modalOverlay"><div class="modal" style="max-width:480px;">
    <button class="modal-close" id="modalCloseBtn">×</button>
    <div class="modal-title">${esc(title)}</div>
    ${body}
  </div></div>`;
}

function renderModal(){
  if(MODAL.type==='member') return memberDetailModalHTML(MODAL.memberId);
  return formModalHTML();
}

/* ---------------------- HORÁRIOS (visão geral) ---------------------- */
function viewHorarios(){
  const editable = SESSION.role==='admin' || SESSION.role==='editor';
  const rows = WEEKDAYS.map(dia=>{
    const entries = DB.schedules.filter(s=>s.dia===dia);
    if(entries.length===0) return '';
    return `<tr><td colspan="4" style="background:var(--bg-raised); font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--cyan);">${dia}</td></tr>` +
      entries.map(s=>{ const mem = DB.members.find(m=>m.id===s.memberId); return `<tr><td>${esc(mem?mem.nome:'—')}</td><td class="mono">${esc(s.inicio)} – ${esc(s.fim)}</td><td>${esc(s.local)}</td>${editable?`<td><button class="icon-btn" data-del-sched-global="${s.id}">✕</button></td>`:'<td></td>'}</tr>`;
      }).join('');
  }).join('');
  return `
  <div class="page-title">Horários de Trabalho</div>
  <div class="page-sub">Grade semanal consolidada de presença na oficina/laboratório.</div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Grade semanal<small>Organizada por dia</small></div>
      ${editable? `<button class="btn btn-sm btn-primary" id="newScheduleGlobalBtn">+ Novo horário</button>`:''}
    </div>
    ${DB.schedules.length===0 ? emptyRow('Nenhum horário cadastrado ainda.') : `<div class="table-wrap"><table><thead><tr><th>Membro</th><th>Horário</th><th>Local</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}
  </div>`;
}

/* ---------------------- CRONOGRAMA & AGENDA ---------------------- */
function renderUpcomingEvents(){
  const today = new Date().toISOString().slice(0,10);
  const upcoming = [...DB.events].filter(e=>e.data >= today).sort((a,b)=> a.data.localeCompare(b.data)).slice(0,5);
  if(upcoming.length===0) return emptyRow('Nenhuma atividade futura cadastrada.');
  return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Atividade</th><th>Local</th></tr></thead><tbody>
  ${upcoming.map(e=>`<tr><td class="mono">${fmtDate(e.data)}${e.horario?` · ${esc(e.horario)}`:''}</td><td>${esc(e.titulo)}</td><td>${esc(e.local||'—')}</td></tr>`).join('')}
  </tbody></table></div>`;
}
function viewCronograma(){
  const isAdmin = SESSION.role==='admin';
  const list = [...DB.events].sort((a,b)=> a.data.localeCompare(b.data));
  return `
  <div class="page-title">Cronograma & Agenda da Equipe</div>
  <div class="page-sub">Datas, competições, reuniões e prazos importantes. ${isAdmin ? '' : 'Somente o administrador pode inserir ou alterar atividades.'}</div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Todas as atividades<small>${list.length} no total</small></div>
      ${isAdmin ? `<button class="btn btn-sm btn-primary" id="newEventBtn">+ Nova atividade</button>` : ''}
    </div>
    ${list.length===0 ? emptyRow('Nenhuma atividade cadastrada ainda.') : `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Atividade</th><th>Local</th><th>Descrição</th>${isAdmin?'<th></th>':''}</tr></thead><tbody>
    ${list.map(e=>`<tr><td class="mono">${fmtDate(e.data)}${e.horario?` · ${esc(e.horario)}`:''}</td><td>${esc(e.titulo)}</td><td>${esc(e.local||'—')}</td><td style="max-width:220px;">${esc(e.descricao||'—')}</td>${isAdmin?`<td style="white-space:nowrap;"><button class="icon-btn" data-edit-event="${e.id}">✎</button><button class="icon-btn" data-del-event="${e.id}">✕</button></td>`:''}</tr>`).join('')}
    </tbody></table></div>`}
  </div>`;
}

/* ---------------------- USUÁRIOS (admin) ---------------------- */
function viewUsuarios(){
  const pending = DB.users.filter(u=>u.status==='pendente');
  const others = DB.users.filter(u=>u.status!=='pendente');
  const memberOptions = (selectedId)=> `<option value="">— sem membro vinculado —</option>` + DB.members.map(m=>`<option value="${m.id}" ${selectedId===m.id?'selected':''}>${esc(m.nome)}</option>`).join('');
  return `
  <div class="page-title">Usuários & Acessos</div>
  <div class="page-sub">Aprovação de cadastros e controle de permissões do sistema.</div>
  <div class="hint-box" style="margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
    <span>Compartilhe o link de cadastro para que os próprios membros preencham seus dados online. Pedidos de nova senha também aparecem aqui, na lista de usuários.</span>
    <button class="btn btn-sm" id="copyRegisterLinkBtnAdmin">🔗 Copiar link de cadastro</button>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Cadastros pendentes<small>Requerem aprovação do administrador</small></div></div>
    ${pending.length===0 ? emptyRow('Nenhum cadastro pendente.') : `<div class="table-wrap"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Dados enviados</th><th>Perfil solicitado</th><th>Membro vinculado</th><th>Data</th><th></th></tr></thead><tbody>
    ${pending.map(u=>`<tr><td>${esc(u.nome)}</td><td class="mono">${esc(u.email)}</td>
      <td style="font-size:11.5px; color:var(--text-muted);">${u.dadosMembro ? `${esc(u.dadosMembro.subequipe||'—')}${u.dadosMembro.turma?' · turma '+esc(u.dadosMembro.turma):''}${u.dadosMembro.turno?' · '+esc(u.dadosMembro.turno):''}` : '<span style="color:var(--text-dim);">sem dados de membro</span>'}</td>
      <td>
        <select data-role-select="${u.id}" style="width:auto; display:inline-block; padding:4px 6px; font-size:12px; background:var(--bg-input); border:1px solid var(--line-bright); color:var(--text); border-radius:4px;">
          <option value="viewer" ${u.role==='viewer'?'selected':''}>Visualização</option>
          <option value="editor" ${u.role==='editor'?'selected':''}>Edição</option>
          <option value="admin">Administrador</option>
        </select>
      </td>
      <td><select data-member-select="${u.id}" style="width:auto; display:inline-block; padding:4px 6px; font-size:12px; background:var(--bg-input); border:1px solid var(--line-bright); color:var(--text); border-radius:4px;">${memberOptions(u.memberId)}</select></td>
      <td class="mono">${fmtDate(u.criadoEm)}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-sm" data-approve-user="${u.id}">Aprovar</button>
        <button class="btn btn-sm btn-danger" data-reject-user="${u.id}">Recusar</button>
      </td></tr>`).join('')}
    </tbody></table></div>`}
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Usuários do sistema<small>${others.length} conta(s)</small></div></div>
    ${others.length===0 ? emptyRow('Nenhum usuário aprovado ainda.') : `<div class="table-wrap"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Membro vinculado</th><th>Status</th><th></th></tr></thead><tbody>
    ${others.map(u=>`<tr><td>${esc(u.nome)}${u.resetRequested?`<br><span class="badge badge-amber"><span class="badge-dot"></span>pediu nova senha</span>`:''}</td><td class="mono">${esc(u.email)}</td><td><span class="role-pill role-${u.role}">${u.role}</span></td>
      <td><select data-member-select="${u.id}" style="width:auto; display:inline-block; padding:4px 6px; font-size:12px; background:var(--bg-input); border:1px solid var(--line-bright); color:var(--text); border-radius:4px;">${memberOptions(u.memberId)}</select></td>
      <td>${statusBadge(u.status)}</td>
      <td style="white-space:nowrap;">
        ${u.resetRequested ? `<button class="btn btn-sm" data-reset-password="${u.id}">🔑 Gerar nova senha</button>` : ''}
        ${u.id!==SESSION.id ? (u.status==='aprovado' ? `<button class="btn btn-sm btn-danger" data-deactivate-user="${u.id}">Desativar</button>` : `<button class="btn btn-sm" data-approve-user="${u.id}">Reativar</button>`) : `<span class="badge badge-cyan">você</span>`}
      </td></tr>`).join('')}
    </tbody></table></div>`}
  </div>
  `;
}
function roleLabel(r){ return {admin:'Administrador', editor:'Edição', viewer:'Visualização'}[r] || r; }
