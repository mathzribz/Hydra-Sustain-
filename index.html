    <div class="panel-head"><div class="panel-title">Dados gerais</div></div>
    <form id="settingsForm">
      <div class="form-row">
        <div class="field"><label>Nome da equipe</label><input name="teamName" value="${esc(DB.settings.teamName||'')}"></div>
        <div class="field"><label>E-mail do administrador (destino dos relatórios)</label><input type="email" name="adminEmail" value="${esc(DB.settings.adminEmail||'')}" placeholder="admin@equipe.com"></div>
      </div>
      <button class="btn btn-primary" type="submit">Salvar configurações</button>
    </form>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Personalização do sistema<small>Itens usados nos formulários e nos alertas</small></div></div>

    <div class="field"><label>Subequipes disponíveis</label>
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;">
        ${(DB.settings.subteams||[]).map(s=>`<span class="badge badge-gray">${esc(s)} <button class="icon-btn" style="padding:0 0 0 4px;" data-del-subteam="${esc(s)}">✕</button></span>`).join('') || '<span style="color:var(--text-dim); font-size:12px;">Nenhuma cadastrada.</span>'}
      </div>
      <form id="addSubteamForm" style="display:flex; gap:8px;">
        <input name="novaSubequipe" placeholder="Nova subequipe..." style="flex:1; background:var(--bg-input); border:1px solid var(--line-bright); color:var(--text); padding:8px 10px; border-radius:5px;">
        <button class="btn btn-sm" type="submit">Adicionar</button>
      </form>
    </div>

    <div class="field" style="margin-top:18px;"><label>Tipos de ausência</label>
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;">
        ${(DB.settings.absenceTypes||[]).map(s=>`<span class="badge badge-gray">${esc(s)} <button class="icon-btn" style="padding:0 0 0 4px;" data-del-abstype="${esc(s)}">✕</button></span>`).join('') || '<span style="color:var(--text-dim); font-size:12px;">Nenhum cadastrado.</span>'}
      </div>
      <form id="addAbsTypeForm" style="display:flex; gap:8px;">
        <input name="novoTipoAusencia" placeholder="Novo tipo de ausência..." style="flex:1; background:var(--bg-input); border:1px solid var(--line-bright); color:var(--text); padding:8px 10px; border-radius:5px;">
        <button class="btn btn-sm" type="submit">Adicionar</button>
      </form>
    </div>

    <div class="field" style="margin-top:18px; max-width:280px;"><label>Nº de ausências em 30 dias para gerar alerta</label>
      <form id="alertThresholdForm" style="display:flex; gap:8px;">
        <input type="number" min="1" name="alertThreshold" value="${DB.settings.alertThreshold||3}" style="flex:1;">
        <button class="btn btn-sm" type="submit">Salvar</button>
      </form>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Envio de relatório<small>Resumo de monitoramento da equipe</small></div></div>
    <p style="font-size:12.5px; color:var(--text-muted); margin-bottom:12px;">
      Este sistema roda inteiramente no navegador, sem servidor próprio — por isso não há envio automático de e-mails em segundo plano.
      O botão abaixo monta um e-mail de resumo e abre o seu aplicativo de e-mail padrão para envio manual ao endereço configurado acima.
      Também é possível baixar os dados para backup ou anexo.
    </p>
    <div class="form-actions">
      <button class="btn btn-primary" id="mailReportBtn">✉ Preparar e-mail de resumo</button>
      <button class="btn" id="downloadJsonBtn">⬇ Baixar dados (JSON)</button>
      <button class="btn" id="downloadTxtBtn">⬇ Baixar relatório (TXT)</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Versão instalável<small>Use o HYDRA Sustain fora do Claude, com ou sem internet</small></div></div>
    <p style="font-size:12.5px; color:var(--text-muted); margin-bottom:12px;">
      Baixe uma cópia completa do sistema como um único arquivo .html. Guarde-o em qualquer pasta do computador
      e abra-o com dois cliques em qualquer navegador — não precisa de internet nem de instalação. Os dados ficam
      salvos localmente no próprio navegador de cada computador onde o arquivo for aberto.
    </p>
    <button class="btn btn-primary" id="downloadAppBtnCfg">⬇ Baixar HYDRA Sustain (.html)</button>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Sincronização entre computadores<small>Para que instalações em máquinas diferentes vejam os mesmos dados</small></div></div>
    <p style="font-size:12.5px; color:var(--text-muted); margin-bottom:12px;">
      Um arquivo instalado em vários computadores, por si só, não compartilha dados entre eles — cada instalação fica isolada.
      Para que as informações inseridas em uma máquina possam ser conferidas online por quem instalou o programa em outra,
      conecte esta instalação a um "cofre" gratuito do serviço <a href="https://jsonbin.io" target="_blank" rel="noopener">JSONBin.io</a>:
      crie uma conta grátis lá, gere um Bin (documento) e uma X-Master-Key, e informe os dois campos abaixo. Todas as instalações
      que usarem o mesmo Bin ID e a mesma chave passam a enxergar os mesmos dados.
    </p>
    <form id="syncForm">
      <div class="field"><label><input type="checkbox" name="syncEnabled" ${DB.settings.syncEnabled?'checked':''}> Ativar sincronização online</label></div>
      <div class="form-row">
        <div class="field"><label>Bin ID (JSONBin.io)</label><input name="syncBinId" value="${esc(DB.settings.syncBinId||'')}" placeholder="Ex: 65fa1c2e...">
        </div>
        <div class="field"><label>X-Master-Key (chave de acesso)</label><input name="syncApiKey" value="${esc(DB.settings.syncApiKey||'')}" placeholder="Chave gerada pelo JSONBin.io"></div>
      </div>
      <button class="btn btn-primary btn-sm" type="submit">Salvar configuração de sincronização</button>
    </form>
    <div class="form-actions" style="margin-top:14px;">
      <button class="btn btn-sm" id="syncPullBtn">🔽 Buscar dados da nuvem</button>
      <button class="btn btn-sm" id="syncPushBtn">🔼 Enviar meus dados para a nuvem</button>
    </div>
    <div class="hint-box" style="margin-top:12px;">
      ${syncConfigured() ? `Sincronização ativa. Última sincronização: ${DB.settings.lastSync ? fmtDateTime(DB.settings.lastSync) : 'ainda não sincronizado'}.${SYNC_STATUS==='erro'?' — última tentativa falhou (verifique internet ou os dados do Bin).':''}` : 'Sincronização ainda não configurada — cada instalação está funcionando de forma independente.'}
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Código-fonte do sistema<small>Acesso avançado — apenas administrador</small></div></div>
    <p style="font-size:12.5px; color:var(--text-muted); margin-bottom:12px;">
      Abaixo está o código completo (HTML/CSS/JavaScript) que roda este programa. Você pode copiá-lo, editá-lo diretamente
      no campo abaixo e baixar sua própria versão personalizada. Como o HYDRA Sustain é um arquivo único sem servidor,
      alterações feitas aqui <b>não mudam o app em execução agora</b> — elas só valem no novo arquivo baixado, que substitui o antigo.
    </p>
    <div class="field">
      <textarea id="sourceCodeBox" spellcheck="false" style="min-height:260px; font-family:var(--font-mono); font-size:11.5px; white-space:pre; overflow:auto;">${esc(PRISTINE_HTML)}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="downloadEditedSourceBtn">⬇ Baixar como novo .html</button>
      <button class="btn" id="copySourceBtn">📋 Copiar código</button>
      <button class="btn btn-ghost" id="resetSourceBtn">↺ Restaurar código original</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Minha conta</div></div>
    <form id="pwForm">
      <div class="form-row">
        ${pwField('Nova senha', 'senha', 'pwFormSenhaInput', 'minlength="4" placeholder="Deixe em branco para manter"')}
        ${pwField('Confirmar senha', 'senha2', 'pwFormSenha2Input', 'minlength="4"')}
      </div>
      <button class="btn btn-sm" type="submit">Atualizar senha</button>
    </form>
  </div>
  `;
}

/* ---------------------- EVENTS: APP ---------------------- */
function attachAppEvents(){
  attachPasswordToggles();
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.onclick = ()=>{ VIEW = el.dataset.view; MODAL=null; SIDEBAR_OPEN=false; render(); };
  });
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  if(hamburgerBtn) hamburgerBtn.onclick = ()=>{ SIDEBAR_OPEN = !SIDEBAR_OPEN; render(); };
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  if(sidebarBackdrop) sidebarBackdrop.onclick = ()=>{ SIDEBAR_OPEN = false; render(); };
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = async ()=>{ await addLog(SESSION.nome,'Logout.'); SESSION=null; render(); };
  const installBtnTop = document.getElementById('installAppBtnTop');
  if(installBtnTop) installBtnTop.onclick = ()=> installApp();

  // membros grid
  document.querySelectorAll('[data-member]').forEach(el=>{
    el.onclick = ()=>{ MODAL = {type:'member', memberId: el.dataset.member, tab:'perfil'}; render(); };
  });
  const newMemberBtn = document.getElementById('newMemberBtn');
  if(newMemberBtn) newMemberBtn.onclick = ()=>{ MODAL={type:'memberForm', payload:{}}; render(); };

  // horarios global
  const newSchedGlobal = document.getElementById('newScheduleGlobalBtn');
  if(newSchedGlobal) newSchedGlobal.onclick = ()=>{
    if(DB.members.length===0){ toast('Cadastre um membro primeiro.'); return; }
    MODAL={type:'schedForm', payload:{global:true}}; render();
  };
  document.querySelectorAll('[data-del-sched-global]').forEach(el=>{
    el.onclick = async ()=>{ DB.schedules = DB.schedules.filter(s=>s.id!==el.dataset.delSchedGlobal); await saveSchedules(); await addLog(SESSION.nome,'Removeu um horário.'); render(); };
  });

  // ausencias global
  const newAbsGlobal = document.getElementById('newAbsGlobalBtn');
  if(newAbsGlobal) newAbsGlobal.onclick = ()=>{
    if(DB.members.length===0){ toast('Cadastre um membro primeiro.'); return; }
    MODAL={type:'absForm', payload:{global:true}}; render();
  };
  document.querySelectorAll('[data-approve-abs-g]').forEach(el=>{
    el.onclick = async ()=>{ await setAbsStatus(el.dataset.approveAbsG, 'Aprovada'); render(); };
  });
  document.querySelectorAll('[data-reject-abs-g]').forEach(el=>{
    el.onclick = async ()=>{ await setAbsStatus(el.dataset.rejectAbsG, 'Rejeitada'); render(); };
  });

  // usuarios
  const copyRegBtnAdmin = document.getElementById('copyRegisterLinkBtnAdmin');
  if(copyRegBtnAdmin) copyRegBtnAdmin.onclick = ()=> copyRegisterLink();
  document.querySelectorAll('[data-approve-user]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.approveUser;
      const sel = document.querySelector(`[data-role-select="${id}"]`);
      const role = sel ? sel.value : undefined;
      const memberSel = document.querySelector(`[data-member-select="${id}"]`);
      const u = DB.users.find(x=>x.id===id);
      if(!u) return;
      u.status='aprovado'; if(role) u.role = role;
      let saveMembersNeeded = false;
      if(memberSel && memberSel.value){
        u.memberId = memberSel.value;
      } else if(!u.memberId && u.dadosMembro){
        const d = u.dadosMembro;
        const novoMembro = { id:uid(), nome:u.nome, subequipe:d.subequipe, funcao:'Membro', contato:d.contato,
          dataEntrada: nowISO(), status:'ativo', perfil:'Novato', dataNascimento:d.dataNascimento, serie:d.serie,
          turma:d.turma, turno:d.turno, tamanhoCamisa:d.tamanhoCamisa, anoEntrada:d.anoEntrada };
        DB.members.push(novoMembro);
        u.memberId = novoMembro.id;
        saveMembersNeeded = true;
      }
      await saveUsers();
      if(saveMembersNeeded) await saveMembers();
      await addLog(SESSION.nome, `Aprovou o acesso de ${u.nome} (${roleLabel(u.role)})${saveMembersNeeded?' e criou o cadastro de membro correspondente':''}.`);
      toast('Usuário aprovado.'); render();
    };
  });
  document.querySelectorAll('[data-member-select]').forEach(el=>{
    el.onchange = async ()=>{
      const u = DB.users.find(x=>x.id===el.dataset.memberSelect);
      if(u){ u.memberId = el.value || null; await saveUsers(); await addLog(SESSION.nome, `Atualizou o membro vinculado à conta de ${u.nome}.`); toast('Vínculo atualizado.'); if(SESSION.id===u.id) SESSION.memberId = u.memberId; render(); }
    };
  });
  document.querySelectorAll('[data-reset-password]').forEach(el=>{
    el.onclick = async ()=>{
      const u = DB.users.find(x=>x.id===el.dataset.resetPassword);
      if(!u) return;
      const temp = genTempPassword();
      u.senha = temp; u.resetRequested = false; u.resetRequestedAt = null;
      await saveUsers();
      await addLog(SESSION.nome, `Gerou uma nova senha temporária para ${u.nome}.`);
      toast('Nova senha gerada. Confira o e-mail preparado para envio.');
      const subject = encodeURIComponent('Nova senha de acesso — HYDRA Sustain');
      const body = encodeURIComponent(`Olá, ${u.nome}!\n\nSua senha de acesso ao HYDRA Sustain foi redefinida.\n\nNova senha temporária: ${temp}\n\nEntre no sistema com essa senha e, por segurança, troque-a em Configurações → Minha conta assim que possível.`);
      window.location.href = `mailto:${u.email}?subject=${subject}&body=${body}`;
      render();
    };
  });
  document.querySelectorAll('[data-reject-user]').forEach(el=>{
    el.onclick = async ()=>{
      const u = DB.users.find(x=>x.id===el.dataset.rejectUser);
      if(u){ u.status='rejeitado'; await saveUsers(); await addLog(SESSION.nome, `Recusou o cadastro de ${u.nome}.`); render(); }
    };
  });
  document.querySelectorAll('[data-deactivate-user]').forEach(el=>{
    el.onclick = async ()=>{
      const u = DB.users.find(x=>x.id===el.dataset.deactivateUser);
      if(u){ u.status='inativo'; await saveUsers(); await addLog(SESSION.nome, `Desativou o acesso de ${u.nome}.`); render(); }
    };
  });

  // cronograma
  const newEventBtn = document.getElementById('newEventBtn');
  if(newEventBtn) newEventBtn.onclick = ()=>{ MODAL={type:'eventForm', payload:{}}; render(); };
  document.querySelectorAll('[data-edit-event]').forEach(el=>{
    el.onclick = ()=>{ const ev = DB.events.find(x=>x.id===el.dataset.editEvent); MODAL={type:'eventForm', payload:{event:ev}}; render(); };
  });
  document.querySelectorAll('[data-del-event]').forEach(el=>{
    el.onclick = async ()=>{
      if(!confirm('Remover esta atividade da agenda?')) return;
      DB.events = DB.events.filter(x=>x.id!==el.dataset.delEvent);
      await saveEvents(); await addLog(SESSION.nome, 'Removeu uma atividade do cronograma.'); render();
    };
  });

  // aparência
  const themeForm = document.getElementById('themeForm');
  if(themeForm) themeForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(themeForm);
    const theme = { accent:fd.get('accent'), bg:fd.get('bg'), text:fd.get('text') };
    await saveTheme(theme);
    toast('Cores salvas.'); render();
  };
  const resetThemeBtn = document.getElementById('resetThemeBtn');
  if(resetThemeBtn) resetThemeBtn.onclick = async ()=>{
    await saveTheme(null); toast('Cores padrão restauradas.'); render();
  };

  // config
  const settingsForm = document.getElementById('settingsForm');
  if(settingsForm) settingsForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(settingsForm);
    DB.settings.teamName = fd.get('teamName');
    DB.settings.adminEmail = fd.get('adminEmail');
    await saveSettings(); await addLog(SESSION.nome,'Atualizou configurações do sistema.');
    toast('Configurações salvas.'); render();
  };
  const pwForm = document.getElementById('pwForm');
  if(pwForm) pwForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(pwForm);
    const s1 = fd.get('senha'), s2 = fd.get('senha2');
    if(!s1){ toast('Informe uma nova senha.'); return; }
    if(s1!==s2){ toast('As senhas não coincidem.'); return; }
    SESSION.senha = s1;
    const u = DB.users.find(x=>x.id===SESSION.id); if(u) u.senha = s1;
    await saveUsers(); toast('Senha atualizada.'); pwForm.reset();
  };
  const mailBtn = document.getElementById('mailReportBtn');
  if(mailBtn) mailBtn.onclick = ()=> sendMailReport();
  const dlJson = document.getElementById('downloadJsonBtn');
  if(dlJson) dlJson.onclick = ()=> downloadFile('relatorio_equipe.json', JSON.stringify(DB, null, 2), 'application/json');
  const dlTxt = document.getElementById('downloadTxtBtn');
  if(dlTxt) dlTxt.onclick = ()=> downloadFile('relatorio_equipe.txt', buildReportText(), 'text/plain');
  const dlAppCfg = document.getElementById('downloadAppBtnCfg');
  if(dlAppCfg) dlAppCfg.onclick = ()=> downloadAppCopy();

  const syncForm = document.getElementById('syncForm');
  if(syncForm) syncForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(syncForm);
    DB.settings.syncEnabled = fd.get('syncEnabled') === 'on';
    DB.settings.syncBinId = (fd.get('syncBinId')||'').trim();
    DB.settings.syncApiKey = (fd.get('syncApiKey')||'').trim();
    await saveSettings();
    toast('Configuração de sincronização salva.'); render();
  };
  const syncPullBtn = document.getElementById('syncPullBtn');
  if(syncPullBtn) syncPullBtn.onclick = async ()=>{
    if(!syncConfigured()){ toast('Configure e salve o Bin ID e a chave primeiro.'); return; }
    toast('Buscando dados da nuvem...');
    const r = await syncPull();
    SYNC_STATUS = r.ok ? 'ok' : 'erro';
    toast(r.ok ? 'Dados atualizados a partir da nuvem.' : `Falha ao buscar: ${r.reason}`);
    render();
  };
  const syncPushBtn = document.getElementById('syncPushBtn');
  if(syncPushBtn) syncPushBtn.onclick = async ()=>{
    if(!syncConfigured()){ toast('Configure e salve o Bin ID e a chave primeiro.'); return; }
    toast('Enviando dados para a nuvem...');
    const r = await syncPush();
    SYNC_STATUS = r.ok ? 'ok' : 'erro';
    toast(r.ok ? 'Dados enviados para a nuvem.' : `Falha ao enviar: ${r.reason}`);
    render();
  };

  const sourceBox = document.getElementById('sourceCodeBox');
  const dlEditedBtn = document.getElementById('downloadEditedSourceBtn');
  if(dlEditedBtn) dlEditedBtn.onclick = ()=>{
    const code = sourceBox ? sourceBox.value : PRISTINE_HTML;
    downloadFile('HYDRA_Sustain_editado.html', code, 'text/html');
    toast('Código baixado — abra o novo arquivo para usar sua versão editada.');
  };
  const copySourceBtn = document.getElementById('copySourceBtn');
  if(copySourceBtn) copySourceBtn.onclick = ()=>{
    const code = sourceBox ? sourceBox.value : PRISTINE_HTML;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(code).then(()=>toast('Código copiado para a área de transferência.')).catch(()=>{ if(sourceBox){ sourceBox.select(); } toast('Selecione e copie manualmente (Ctrl/Cmd+C).'); });
    } else if(sourceBox){ sourceBox.select(); toast('Selecione e copie manualmente (Ctrl/Cmd+C).'); }
  };
  const resetSourceBtn = document.getElementById('resetSourceBtn');
  if(resetSourceBtn) resetSourceBtn.onclick = ()=>{ if(sourceBox){ sourceBox.value = PRISTINE_HTML; toast('Código original restaurado no campo de edição.'); } };

  // personalização de itens do sistema
  const subteamForm = document.getElementById('addSubteamForm');
  if(subteamForm) subteamForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(subteamForm);
    const val = (fd.get('novaSubequipe')||'').trim();
    if(!val) return;
    DB.settings.subteams = DB.settings.subteams || [];
    if(!DB.settings.subteams.includes(val)) DB.settings.subteams.push(val);
    await saveSettings(); await addLog(SESSION.nome, `Adicionou a subequipe "${val}".`);
    render();
  };
  document.querySelectorAll('[data-del-subteam]').forEach(el=>{
    el.onclick = async ()=>{
      DB.settings.subteams = (DB.settings.subteams||[]).filter(s=>s!==el.dataset.delSubteam);
      await saveSettings(); render();
    };
  });
  const absTypeForm = document.getElementById('addAbsTypeForm');
  if(absTypeForm) absTypeForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(absTypeForm);
    const val = (fd.get('novoTipoAusencia')||'').trim();
    if(!val) return;
    DB.settings.absenceTypes = DB.settings.absenceTypes || [];
    if(!DB.settings.absenceTypes.includes(val)) DB.settings.absenceTypes.push(val);
    await saveSettings(); await addLog(SESSION.nome, `Adicionou o tipo de ausência "${val}".`);
    render();
  };
  document.querySelectorAll('[data-del-abstype]').forEach(el=>{
    el.onclick = async ()=>{
      DB.settings.absenceTypes = (DB.settings.absenceTypes||[]).filter(s=>s!==el.dataset.delAbstype);
      await saveSettings(); render();
    };
  });
  const alertForm = document.getElementById('alertThresholdForm');
  if(alertForm) alertForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(alertForm);
    DB.settings.alertThreshold = Math.max(1, Number(fd.get('alertThreshold'))||3);
    await saveSettings(); await addLog(SESSION.nome, 'Atualizou o limite de alerta de faltas.');
    toast('Limite de alerta atualizado.'); render();
  };
}

async function setAbsStatus(id, status){
  const a = DB.absences.find(x=>x.id===id);
  if(a){ a.status=status; a.avaliadoPor = SESSION.nome; await saveAbsences(); const mem = DB.members.find(m=>m.id===a.memberId); await addLog(SESSION.nome, `${status==='Aprovada'?'Aprovou':'Rejeitou'} a ausência de ${mem?mem.nome:'membro'} (${fmtDate(a.data)}).`); }
}

function buildReportText(){
  const m = computeMonitoring();
  let t = `RELATÓRIO — ${DB.settings.teamName || 'Equipe de Robótica'}\nGerado em: ${fmtDateTime(nowISO())}\n\n`;
  t += `MEMBROS ATIVOS: ${m.activeMembers.length} de ${DB.members.length}\n`;
  t += `AUSÊNCIAS PENDENTES DE AVALIAÇÃO: ${m.pendingAbsences.length}\n`;
  t += `TAXA DE JUSTIFICAÇÃO DE AUSÊNCIAS: ${m.taxaJustificacao}%\n`;
  t += `METAS DE PDP CONCLUÍDAS: ${m.concluidoPdp} de ${m.totalPdp}\n\n`;
  t += `ALERTAS DE FREQUÊNCIA (${DB.settings.alertThreshold||3}+ ausências em 30 dias):\n`;
  t += m.alertMembers.length ? m.alertMembers.map(a=>` - ${a.member.nome}: ${a.count} ausências\n`).join('') : ' - Nenhum\n';
  t += `\nMETAS DE PDP ATRASADAS:\n`;
  t += m.overduePdp.length ? m.overduePdp.map(p=>{ const mem=DB.members.find(x=>x.id===p.memberId); return ` - ${mem?mem.nome:'—'}: ${p.area} (prazo ${fmtDate(p.prazo)})\n`; }).join('') : ' - Nenhuma\n';
  t += `\nAUSÊNCIAS PENDENTES:\n`;
  t += m.pendingAbsences.length ? m.pendingAbsences.map(a=>{ const mem=DB.members.find(x=>x.id===a.memberId); return ` - ${mem?mem.nome:'—'} em ${fmtDate(a.data)}: ${a.tipo} — "${a.justificativa||'sem justificativa'}"\n`; }).join('') : ' - Nenhuma\n';
  return t;
}
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function sendMailReport(){
  if(!DB.settings.adminEmail){ toast('Configure o e-mail do administrador primeiro.'); return; }
  const subject = encodeURIComponent(`Relatório da equipe — ${DB.settings.teamName || 'Robótica'} — ${fmtDate(nowISO())}`);
  const body = encodeURIComponent(buildReportText());
  window.location.href = `mailto:${DB.settings.adminEmail}?subject=${subject}&body=${body}`;
}

/* ---------------------- EVENTS: MODAL ---------------------- */
function attachModalEvents(){
  const overlay = document.getElementById('modalOverlay');
  if(overlay) overlay.addEventListener('mousedown', (e)=>{ if(e.target===overlay){ MODAL=null; render(); } });
  const closeBtn = document.getElementById('modalCloseBtn');
  if(closeBtn) closeBtn.onclick = ()=>{ MODAL=null; render(); };
  const cancelBtn = document.getElementById('cancelFormBtn');
  if(cancelBtn) cancelBtn.onclick = ()=>{ MODAL = MODAL.payload && MODAL.payload.returnToMember ? {type:'member', memberId:MODAL.payload.returnToMember, tab:MODAL.payload.returnTab||'perfil'} : null; render(); };

  if(MODAL.type==='member'){
    document.querySelectorAll('[data-tab]').forEach(el=>{ el.onclick = ()=>{ MODAL.tab = el.dataset.tab; render(); }; });
    const editBtn = document.getElementById('editMemberBtn');
    if(editBtn) editBtn.onclick = ()=>{ const mem = DB.members.find(m=>m.id===MODAL.memberId); MODAL = {type:'memberForm', payload:{member:mem, returnToMember:mem.id}}; render(); };
    const resendLinkBtn = document.getElementById('resendLinkBtn');
    if(resendLinkBtn) resendLinkBtn.onclick = async ()=>{
      const mem = DB.members.find(m=>m.id===MODAL.memberId);
      if(mem && mem.email){ sendMemberAccessLink(mem); await addLog(SESSION.nome, `Reenviou o link de acesso ao programa para ${mem.nome} (${mem.email}).`); toast('E-mail de acesso preparado.'); }
    };
    const removeBtn = document.getElementById('removeMemberBtn');
    if(removeBtn) removeBtn.onclick = async ()=>{
      if(!confirm('Remover este membro e todos os seus registros associados?')) return;
      const id = MODAL.memberId;
      DB.members = DB.members.filter(m=>m.id!==id);
      DB.schedules = DB.schedules.filter(s=>s.memberId!==id);
      DB.absences = DB.absences.filter(a=>a.memberId!==id);
      DB.pdp = DB.pdp.filter(p=>p.memberId!==id);
      DB.users.forEach(u=>{ if(u.memberId===id) u.memberId=null; });
      await Promise.all([saveMembers(), saveSchedules(), saveAbsences(), savePdp(), saveUsers()]);
      await addLog(SESSION.nome, 'Removeu um membro da equipe.');
      MODAL = null; render();
    };
    const addSchedBtn = document.getElementById('addSchedBtn');
    if(addSchedBtn) addSchedBtn.onclick = ()=>{ MODAL = {type:'schedForm', payload:{memberId:MODAL.memberId, returnToMember:MODAL.memberId, returnTab:'horarios'}}; render(); };
    document.querySelectorAll('[data-del-sched]').forEach(el=>{
      el.onclick = async ()=>{ DB.schedules = DB.schedules.filter(s=>s.id!==el.dataset.delSched); await saveSchedules(); render(); };
    });
    const addAbsBtn = document.getElementById('addAbsBtn');
    if(addAbsBtn) addAbsBtn.onclick = ()=>{ MODAL = {type:'absForm', payload:{memberId:MODAL.memberId, returnToMember:MODAL.memberId, returnTab:'ausencias'}}; render(); };
    document.querySelectorAll('[data-approve-abs]').forEach(el=>{ el.onclick = async ()=>{ await setAbsStatus(el.dataset.approveAbs,'Aprovada'); render(); }; });
    document.querySelectorAll('[data-reject-abs]').forEach(el=>{ el.onclick = async ()=>{ await setAbsStatus(el.dataset.rejectAbs,'Rejeitada'); render(); }; });
    const addPdpBtn = document.getElementById('addPdpBtn');
    if(addPdpBtn) addPdpBtn.onclick = ()=>{ MODAL = {type:'pdpForm', payload:{memberId:MODAL.memberId, returnToMember:MODAL.memberId, returnTab:'pdp'}}; render(); };
    document.querySelectorAll('[data-edit-pdp]').forEach(el=>{
      el.onclick = ()=>{ const pd = DB.pdp.find(x=>x.id===el.dataset.editPdp); MODAL = {type:'pdpForm', payload:{pdp:pd, memberId:MODAL.memberId, returnToMember:MODAL.memberId, returnTab:'pdp'}}; render(); };
    });
    document.querySelectorAll('[data-del-pdp]').forEach(el=>{
      el.onclick = async ()=>{ DB.pdp = DB.pdp.filter(x=>x.id!==el.dataset.delPdp); await savePdp(); render(); };
    });
    return;
  }

  const memberForm = document.getElementById('memberFormEl');
  if(memberForm) memberForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(memberForm);
    const fields = { nome:fd.get('nome'), subequipe:fd.get('subequipe'), funcao:fd.get('funcao'), email:fd.get('email'), contato:fd.get('contato'), dataEntrada:fd.get('dataEntrada'), status:fd.get('status'),
      perfil:fd.get('perfil'), dataNascimento:fd.get('dataNascimento'), serie:fd.get('serie'), turma:fd.get('turma'), turno:fd.get('turno'), tamanhoCamisa:fd.get('tamanhoCamisa'), anoEntrada:Number(fd.get('anoEntrada'))||null };
    const existing = MODAL.payload.member;
    const enviarLink = fd.get('enviarLink')==='on';
    let novoMembroCriado = null;
    if(existing){
      Object.assign(existing, fields);
      await addLog(SESSION.nome, `Editou os dados de ${existing.nome}.`);
    } else {
      const nm = { id:uid(), ...fields };
      if(!nm.funcao) nm.funcao='Membro'; if(!nm.dataEntrada) nm.dataEntrada = nowISO(); if(!nm.status) nm.status='ativo';
      DB.members.push(nm);
      novoMembroCriado = nm;
      await addLog(SESSION.nome, `Cadastrou o novo membro ${nm.nome}.`);
    }
    await saveMembers();
    if(novoMembroCriado && enviarLink && novoMembroCriado.email){
      sendMemberAccessLink(novoMembroCriado);
      await addLog(SESSION.nome, `Enviou o link de acesso ao programa para ${novoMembroCriado.nome} (${novoMembroCriado.email}).`);
    }
    MODAL = MODAL.payload.returnToMember ? {type:'member', memberId:MODAL.payload.returnToMember, tab:'perfil'} : null;
    render();
  };

  const schedForm = document.getElementById('schedFormEl');
  if(schedForm) schedForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(schedForm);
    const memberId = MODAL.payload.memberId || fd.get('memberId');
    if(!memberId){ toast('Selecione um membro.'); return; }
    DB.schedules.push({ id:uid(), memberId, dia:fd.get('dia'), inicio:fd.get('inicio'), fim:fd.get('fim'), local:fd.get('local') });
    await saveSchedules();
    const mem = DB.members.find(m=>m.id===memberId);
    await addLog(SESSION.nome, `Adicionou horário para ${mem?mem.nome:'membro'}.`);
    MODAL = MODAL.payload.returnToMember ? {type:'member', memberId:MODAL.payload.returnToMember, tab:'horarios'} : null;
    render();
  };

  const absForm = document.getElementById('absFormEl');
  if(absForm) absForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(absForm);
    let memberId = MODAL.payload.memberId || fd.get('memberId');
    if(!memberId){ toast('Selecione um membro.'); return; }
    DB.absences.push({ id:uid(), memberId, data:fd.get('data'), tipo:fd.get('tipo'), justificativa:fd.get('justificativa'), status:'Pendente', registradoEm: nowISO() });
    await saveAbsences();
    const mem = DB.members.find(m=>m.id===memberId);
    await addLog(SESSION.nome, `Registrou ausência de ${mem?mem.nome:'membro'} em ${fmtDate(fd.get('data'))}.`);
    toast('Ausência registrada.');
    MODAL = MODAL.payload.returnToMember ? {type:'member', memberId:MODAL.payload.returnToMember, tab:'ausencias'} : null;
    render();
  };

  const eventForm = document.getElementById('eventFormEl');
  if(eventForm) eventForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(eventForm);
    const existing = MODAL.payload.event;
    const data = { titulo:fd.get('titulo'), data:fd.get('data'), horario:fd.get('horario'), local:fd.get('local'), descricao:fd.get('descricao') };
    if(existing){ Object.assign(existing, data); await addLog(SESSION.nome, `Editou a atividade "${data.titulo}" do cronograma.`); }
    else { DB.events.push({ id:uid(), ...data }); await addLog(SESSION.nome, `Adicionou a atividade "${data.titulo}" ao cronograma.`); }
    await saveEvents();
    MODAL = null; render();
  };

  const pdpForm = document.getElementById('pdpFormEl');
  if(pdpForm) pdpForm.onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(pdpForm);
    const existing = MODAL.payload.pdp;
    const memberId = MODAL.payload.memberId || (existing && existing.memberId);
    const data = { area:fd.get('area'), nivelAtual:Number(fd.get('nivelAtual')), nivelMeta:Number(fd.get('nivelMeta')), progresso:Number(fd.get('progresso')), prazo:fd.get('prazo'), status:fd.get('status'), acoes:fd.get('acoes') };
    const file = fd.get('arquivo');
    if(file && file.size > 0){
      if(file.size > 2*1024*1024){ toast('Arquivo muito grande. Limite de 2MB.'); return; }
      try{
        const dataUrl = await readFileAsDataURL(file);
        data.anexo = { nome:file.name, tipo:file.type, tamanho:file.size, dados:dataUrl };
      }catch(err){ toast('Não foi possível ler o arquivo.'); return; }
    } else if(fd.get('removerAnexo')==='1'){
      data.anexo = null;
    }
    if(existing){ Object.assign(existing, data); }
    else { DB.pdp.push({ id:uid(), memberId, ...data }); }
    await savePdp();
    const mem = DB.members.find(m=>m.id===memberId);
    await addLog(SESSION.nome, `Atualizou plano de desenvolvimento de ${mem?mem.nome:'membro'}.`);
    MODAL = MODAL.payload.returnToMember ? {type:'member', memberId:MODAL.payload.returnToMember, tab:'pdp'} : null;
    render();
  };
}

/* ---------------------- PWA: instalação e service worker ---------------------- */
let DEFERRED_INSTALL_PROMPT = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  DEFERRED_INSTALL_PROMPT = e;
});
window.addEventListener('appinstalled', ()=>{
  DEFERRED_INSTALL_PROMPT = null;
  toast('HYDRA Sustain instalado com sucesso!');
});
function installApp(){
  if(DEFERRED_INSTALL_PROMPT){
    DEFERRED_INSTALL_PROMPT.prompt();
    DEFERRED_INSTALL_PROMPT.userChoice.finally(()=>{ DEFERRED_INSTALL_PROMPT = null; });
  } else {
    toast('Para instalar: no Chrome/Edge use o menu ⋮ → "Instalar app". No celular Android, "Adicionar à tela inicial". No iPhone/iPad (Safari), toque em Compartilhar → "Adicionar à Tela de Início".');
  }
}
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    try{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }catch(e){}
  });
}

/* ---------------------- BOOT ---------------------- */
(async function boot(){
  if(window.location.hash === '#cadastro') AUTH_MODE = 'register';
  render();
  await loadAll();
  render();
})();
